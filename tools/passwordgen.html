<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ToolXD • Password Generator</title>

  <link rel="stylesheet" href="../css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    body{
      overflow:hidden;
    }

    .page{
      position:relative;
      z-index:2;
      height:100vh;
      padding:2rem;
      display:flex;
      flex-direction:column;
    }

    nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:4rem;
    }

    .logo{
      font-size:1.5rem;
      font-weight:700;
      letter-spacing:-.06em;
    }

    .back{
      font-size:.95rem;
      color:var(--muted);
    }

    .layout{
      flex:1;

      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:5rem;

      align-items:center;
    }

    /* =======================
       LEFT
    ======================= */

    .left{
      max-width:700px;
    }

    .eyebrow{
      font-size:.75rem;
      text-transform:uppercase;
      letter-spacing:.2em;
      color:var(--muted);
      margin-bottom:1.5rem;
    }

    h1{
      font-size:clamp(4rem,8vw,7rem);
      line-height:.88;
      letter-spacing:-.1em;
    }

    .desc{
      margin-top:2rem;
      max-width:560px;

      color:var(--muted);
      line-height:1.9;
      font-size:1rem;
    }

    .password-box{
      margin-top:4rem;

      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:1rem;

      padding-bottom:1rem;

      border-bottom:1px solid rgba(0,0,0,.08);
    }

    #password{
      font-size:clamp(1rem,2vw,1.5rem);
      font-weight:600;
      letter-spacing:.08em;

      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* =======================
       COPY BUTTON
    ======================= */

    .copy-btn{
      width:58px;
      height:58px;

      border:none;
      border-radius:18px;

      background:#111;
      color:#fff;

      display:flex;
      align-items:center;
      justify-content:center;

      cursor:pointer;

      transition:.35s ease;
    }

    .copy-btn:hover{
      transform:translateY(-2px);
    }

    .copy-icon,
    .check-icon{
      position:absolute;
      width:22px;
      height:22px;

      transition:.35s ease;
    }

    .check-icon{
      opacity:0;
      transform:scale(.5) rotate(-20deg);
    }

    .copy-btn.copied .copy-icon{
      opacity:0;
      transform:scale(.5) rotate(20deg);
    }

    .copy-btn.copied .check-icon{
      opacity:1;
      transform:scale(1) rotate(0deg);
    }

    /* =======================
       RIGHT
    ======================= */

    .right{
      width:100%;
      max-width:420px;
      margin-left:auto;
    }

    .control{
      margin-bottom:2.5rem;
    }

    .control-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:1rem;
    }

    .control-top span{
      font-size:.95rem;
      font-weight:600;
    }

    .length-input{
      width:68px;
      height:42px;

      border:none;
      outline:none;

      background:rgba(255,255,255,.7);

      border:1px solid rgba(0,0,0,.06);

      border-radius:14px;

      text-align:center;

      font-family:inherit;
      font-weight:600;
    }

    .slider{
      width:100%;
      appearance:none;
      height:5px;
      border-radius:999px;
      background:rgba(0,0,0,.08);
    }

    .slider::-webkit-slider-thumb{
      appearance:none;

      width:18px;
      height:18px;

      border-radius:50%;
      background:#111;

      cursor:pointer;
    }

    .options{
      display:grid;
      gap:1rem;
    }

    .option{
      display:flex;
      align-items:center;
      gap:.8rem;

      padding:1rem 0;

      border-bottom:1px solid rgba(0,0,0,.06);
    }

    .option input{
      width:18px;
      height:18px;
      accent-color:#111;
    }

    .option label{
      font-size:.95rem;
    }

    .generate{
      margin-top:3rem;

      width:100%;
      height:58px;

      border:none;
      border-radius:18px;

      background:#111;
      color:#fff;

      font-family:inherit;
      font-size:.95rem;
      font-weight:600;

      cursor:pointer;

      transition:.35s ease;
    }

    .generate:hover{
      transform:translateY(-2px);
    }

    /* =======================
       MOBILE
    ======================= */

    @media (max-width:900px){

      body{
        overflow:auto;
      }

      .page{
        height:auto;
        min-height:100vh;
      }

      .layout{
        grid-template-columns:1fr;
        gap:4rem;
      }

      .right{
        max-width:100%;
      }

      h1{
        font-size:clamp(3rem,14vw,5rem);
      }

    }

  </style>
</head>

<body>

  <div class="bg-grid"></div>
  <div class="gradient gradient-1"></div>
  <div class="gradient gradient-2"></div>
  <div class="noise"></div>

  <main class="page">

    <nav>

      <div class="logo">
        ToolXD
      </div>

      <a href="../index.html" class="back">
        ← Back
      </a>

    </nav>

    <section class="layout">

      <!-- LEFT -->

      <div class="left">

        <div class="eyebrow">
          Secure Utility
        </div>

        <h1>
          Passwords,<br>
          quietly premium
        </h1>

        <p class="desc">
          Browser-native password generation with a clean editorial layout,
          minimal interaction, and a luxurious indie-inspired aesthetic.
        </p>

        <div class="password-box">

          <div id="password">
            A7@kL9!zQx2P
          </div>

          <button class="copy-btn" id="copyBtn">

            <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="11" height="11" rx="2"></rect>
              <path d="M5 15V5a2 2 0 0 1 2-2h10"></path>
            </svg>

            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>

          </button>

        </div>

      </div>

      <!-- RIGHT -->

      <div class="right">

        <div class="control">

          <div class="control-top">

            <span>Password Length</span>

            <input
              type="number"
              min="6"
              max="64"
              value="12"
              id="lengthInput"
              class="length-input"
            >

          </div>

          <input
            type="range"
            min="6"
            max="64"
            value="12"
            class="slider"
            id="slider"
          >

        </div>

        <div class="options">

          <div class="option">
            <input type="checkbox" id="uppercase" checked>
            <label for="uppercase">Uppercase Letters</label>
          </div>

          <div class="option">
            <input type="checkbox" id="lowercase" checked>
            <label for="lowercase">Lowercase Letters</label>
          </div>

          <div class="option">
            <input type="checkbox" id="numbers" checked>
            <label for="numbers">Numbers</label>
          </div>

          <div class="option">
            <input type="checkbox" id="symbols" checked>
            <label for="symbols">Symbols</label>
          </div>

        </div>

        <button class="generate" id="generateBtn">
          Generate Password
        </button>

      </div>

    </section>

  </main>

  <script>

    const password = document.getElementById("password");

    const copyBtn = document.getElementById("copyBtn");
    const generateBtn = document.getElementById("generateBtn");

    const slider = document.getElementById("slider");
    const lengthInput = document.getElementById("lengthInput");

    const uppercase = document.getElementById("uppercase");
    const lowercase = document.getElementById("lowercase");
    const numbers = document.getElementById("numbers");
    const symbols = document.getElementById("symbols");

    slider.addEventListener("input", () => {
      lengthInput.value = slider.value;
    });

    lengthInput.addEventListener("input", () => {

      let value = parseInt(lengthInput.value);

      if(isNaN(value)) value = 6;

      if(value < 6) value = 6;
      if(value > 64) value = 64;

      slider.value = value;
      lengthInput.value = value;

    });

    function generatePassword(){

      const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const lower = "abcdefghijklmnopqrstuvwxyz";
      const nums = "0123456789";
      const syms = "!@#$%^&*()_+=-{}[]<>?/";

      let chars = "";

      if(uppercase.checked) chars += upper;
      if(lowercase.checked) chars += lower;
      if(numbers.checked) chars += nums;
      if(symbols.checked) chars += syms;

      if(chars.length === 0){

        password.textContent = "Select at least one option";
        return;

      }

      let result = "";

      for(let i = 0; i < slider.value; i++){

        result += chars.charAt(
          Math.floor(Math.random() * chars.length)
        );

      }

      password.textContent = result;

    }

    generateBtn.addEventListener("click", generatePassword);

    copyBtn.addEventListener("click", async () => {

      await navigator.clipboard.writeText(password.textContent);

      copyBtn.classList.add("copied");

      setTimeout(() => {
        copyBtn.classList.remove("copied");
      }, 1600);

    });

    generatePassword();

  </script>

</body>
</html>
