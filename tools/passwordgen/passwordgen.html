<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ToolXD • Password Generator</title>

    <script src="../../js/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="passwordgen.css">
</head>

<body>
    <div class="bg-grid"></div>
    <div class="gradient gradient-1"></div>
    <div class="gradient gradient-2"></div>
    <div class="noise"></div>

    <main class="page">
      <nav>
        <div class="logo"> ToolXD </div>
        <a href="../../index.html" class="back"> ← Back </a>
      </nav>

      <section class="layout">
        <!-- LEFT -->
        <div class="left">
          <div class="eyebrow"> Browser Native Utility \|/ Clean AF </div>
          <h1> Better <br> passwords. </h1>
          <p class="desc"> Generate secure, random passwords through a minimal interface designed for clarity, speed <br> No ads, No account, No unecessary BS. </p>
          <div class="meta">
            <div class="line"></div>
            <span> Secure • Minimal • Private </span>
            <div class="line"></div>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="right">
          <div class="dots">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>

          <!-- PASSWORD -->
          <div class="password-label"> Generated Password </div>
          <div class="password-box">
            <div id="password"> A7@kL9!zQx2P </div>
            <button class="copy-btn" id="copyBtn">
              <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                <path d="M5 15V5a2 2 0 0 1 2-2h10"></path>
              </svg>
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 6L9 17l-5-5"></path>
              </svg>
            </button>
          </div>

          <!-- CONTROLS -->
          <div class="controls">
            <div class="control-head">
              <span>Password Length</span>
              <input type="number" min="1" max="32" value="12" class="length-input" id="lengthInput">
            </div>
            <input type="range" min="1" max="32" value="12" class="slider" id="slider">
            <div class="options">
              <div class="option">
                <input type="checkbox" id="uppercase" checked>
                <label for="uppercase"> Uppercase Letters </label>
              </div>
              <div class="option">
                <input type="checkbox" id="lowercase" checked>
                <label for="lowercase"> Lowercase Letters </label>
              </div>
              <div class="option">
                <input type="checkbox" id="numbers" checked>
                <label for="numbers"> Numbers </label>
              </div>
              <div class="option">
                <input type="checkbox" id="symbols" checked>
                <label for="symbols"> Symbols </label>
              </div>
            </div>
            <button class="generate" id="generateBtn"> Generate Password </button>
          </div>

        </div>
      </section>
    </main>

<script src="passwordgen.js"></script>
</body>
</html>
