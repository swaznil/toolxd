<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ToolXD • Password Generator</title>

  <link rel="stylesheet" href="../css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>

    body{
      overflow:hidden;
      background:#f3f2ee;
      font-family: "IBM Plex Mono", monospace;
    }

    .page{
      position:relative;
      z-index:2;
      height:100vh;
      padding:2rem 2.5rem;
      display:flex;
      flex-direction:column;
    }

    /* NAV */

    nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:3rem;
    }

    .logo{
      font-size:1.4rem;
      font-weight:700;
      letter-spacing:-.06em;
    }

    .back{
      font-size:.92rem;
      color:var(--muted);
      padding-bottom:.2rem;
      border-bottom:1px solid rgba(0,0,0,.08);
    }

    /* LAYOUT */

    .layout{
      flex:1;
      display:grid;
      grid-template-columns:.9fr 1.1fr;
      gap:5rem;
      align-items:center;
    }

    /* LEFT */

    .left{
      position:relative;
      max-width:520px;
    }

    .eyebrow{
      font-size:.72rem;
      font-weight:600;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:#7b7b7b;
      margin-bottom:1.8rem;
    }

    h1{
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: .03em;
      font-size:clamp(4rem,8vw,7rem);
      line-height:.88;
      font-weight:550;
      color:#111;
    }

    .desc{
      margin-top:2rem;
      max-width:470px;
      font-size:1rem;
      line-height:1.95;
      color:#666;
    }

    .meta{
      margin-top:3rem;
      display:flex;
      align-items:center;
      gap:1rem;
      color:#7b7b7b;
      font-size:.82rem;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .line{
      width:80px;
      height:1px;
      background:
      repeating-linear-gradient(
        to right,
        rgba(0,0,0,.16),
        rgba(0,0,0,.16) 6px,
        transparent 6px,
        transparent 12px
      );
    }

    /* RIGHT */

    .right{
      position:relative;
      padding:3rem;
      border-radius:32px;
      background:
      linear-gradient(
        180deg,
        rgba(80, 200, 75, 0.72),
        rgba(50, 150, 190, 0.54)
      );
      border:1px solid rgba(255,255,255,.6);
      backdrop-filter:blur(16px);
      box-shadow:
      0 30px 80px rgba(0,0,0,.06),
      inset 0 1px 0 rgba(255,255,255,.7);
      overflow:hidden;
    }

    .right::before{
      content:"";
      position:absolute;
      inset:0;
      background:
      radial-gradient(
        circle at top right,
        rgba(255,255,255,.7),
        transparent 40%
      );
      pointer-events:none;
    }

    .dots{
      position:absolute;
      top:28px;
      right:28px;
      display:grid;
      grid-template-columns:repeat(4,6px);
      gap:6px;
    }

    .dots span{
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(0,0,0,.14);
    }

    /* PASSWORD */

    .password-label{
      font-size:.74rem;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.22em;
      color:#777;
      margin-bottom:1.2rem;
    }

    .password-box{
      display:flex;
      align-items:center;
      gap:1rem;
      padding-bottom:1.5rem;
      border-bottom:1px solid rgba(0,0,0,.08);
    }

    #password{
        flex:1;
        font-size:clamp(1.15rem,2vw,1.7rem);
        font-weight:600;
        letter-spacing:.03em;
        color:#111;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .copy-btn{
      width:56px;
      height:56px;
      border:none;
      border-radius:18px;
      background:#111;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.35s ease;
    }

    .copy-btn:hover{
      transform:translateY(-2px);
    }

    .copy-icon,
    .check-icon{
      position:absolute;
      width:22px;
      height:22px;
      transition:.35s ease;
    }

    .check-icon{
      opacity:0;
      transform:scale(.4) rotate(-20deg);
    }

    .copy-btn.copied .copy-icon{
      opacity:0;
      transform:scale(.4) rotate(20deg);
    }

    .copy-btn.copied .check-icon{
      opacity:1;
      transform:scale(1) rotate(0);
    }

    .controls{
      margin-top:2.8rem;
    }

    .control-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:1rem;
    }

    .control-head span{
      font-size:.92rem;
      font-weight:600;
    }

    .length-input{
      width:68px;
      height:42px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,.8);
      border:1px solid rgba(0,0,0,.05);
      text-align:center;
      font-family:inherit;
      font-weight:600;
    }

    .slider{
      width:100%;
      appearance:none;
      height:5px;
      border-radius:999px;
      background:
      linear-gradient(
        90deg,
        #111 20%,
        rgba(0,0,0,.08) 20%
      );
    }

    .slider::-webkit-slider-thumb{
      appearance:none;
      width:18px;
      height:18px;
      border-radius:50%;
      background:#111;
      cursor:pointer;
      border:3px solid #fff;
      box-shadow:0 4px 14px rgba(0,0,0,.15);
    }

    .options{
      margin-top:2.5rem;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:1rem 2rem;
    }

    .option{
      display:flex;
      align-items:center;
      gap:.85rem;
      padding-bottom:1rem;
      border-bottom:1px dashed rgba(0,0,0,.08);
    }

    .option input{
      width:18px;
      height:18px;
      accent-color:#111;
    }

    .option label{
      font-size:.95rem;
      color:#222;
    }

    .generate{
      margin-top:3rem;
      width:100%;
      height:60px;
      border:none;
      border-radius:20px;
      background:#111;
      color:#fff;
      font-family:inherit;
      font-size:.95rem;
      font-weight:600;
      letter-spacing:.01em;
      cursor:pointer;
      transition:.35s ease;
    }

    .generate:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 30px rgba(0,0,0,.12);
    }

    /* Responsive */

    @media (max-width:980px){

      body{
        overflow:auto;
      }

      .page{
        height:auto;
        min-height:100vh;

        padding:1.3rem;
      }

      .layout{
        grid-template-columns:1fr;
        gap:3rem;
      }

      .right{
        padding:1.6rem;
      }

      h1{
        font-size:clamp(3rem,15vw,5rem);
      }

      .options{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <div class="bg-grid"></div>

  <div class="gradient gradient-1"></div>
  <div class="gradient gradient-2"></div>

  <div class="noise"></div>

  <main class="page">

    <nav>

      <div class="logo">
        ToolXD
      </div>

      <a href="../index.html" class="back">
        ← Back
      </a>

    </nav>

    <section class="layout">

        <!-- LEFT -->

        <div class="left">

        <div class="eyebrow">
            Browser Native Utility \|/ Clean AF
        </div>

        <h1>
            Better<br>
            passwords.
        </h1>

        <p class="desc">
            Generate secure, random passwords through a minimal interface
            designed for clarity, speed<br> No ads,  No account, No unecessary
            BS.
        </p>

        <div class="meta">

            <div class="line"></div>

            <span>
            Secure • Minimal • Private
            </span>

            <div class="line"></div>

        </div>

        </div>

      <!-- RIGHT -->

      <div class="right">

        <div class="dots">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- PASSWORD -->

        <div class="password-label">
          Generated Password
        </div>

        <div class="password-box">

          <div id="password">
            A7@kL9!zQx2P
          </div>

          <button class="copy-btn" id="copyBtn">

            <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="11" height="11" rx="2"></rect>
              <path d="M5 15V5a2 2 0 0 1 2-2h10"></path>
            </svg>

            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>

          </button>

        </div>

        <!-- CONTROLS -->

        <div class="controls">

          <div class="control-head">

            <span>Password Length</span>

            <input
              type="number"
              min="1"
              max="32"
              value="12"
              class="length-input"
              id="lengthInput"
            >

          </div>

          <input
            type="range"
            min="1"
            max="32"
            value="12"
            class="slider"
            id="slider"
          >

          <div class="options">

            <div class="option">
              <input type="checkbox" id="uppercase" checked>
              <label for="uppercase">
                Uppercase Letters
              </label>
            </div>

            <div class="option">
              <input type="checkbox" id="lowercase" checked>
              <label for="lowercase">
                Lowercase Letters
              </label>
            </div>

            <div class="option">
              <input type="checkbox" id="numbers" checked>
              <label for="numbers">
                Numbers
              </label>
            </div>

            <div class="option">
              <input type="checkbox" id="symbols" checked>
              <label for="symbols">
                Symbols
              </label>
            </div>

          </div>

          <button class="generate" id="generateBtn">
            Generate Password
          </button>

        </div>

      </div>

    </section>

  </main>

  <script>

    const password = document.getElementById("password");

    const copyBtn = document.getElementById("copyBtn");
    const generateBtn = document.getElementById("generateBtn");

    const slider = document.getElementById("slider");
    const lengthInput = document.getElementById("lengthInput");

    const uppercase = document.getElementById("uppercase");
    const lowercase = document.getElementById("lowercase");
    const numbers = document.getElementById("numbers");
    const symbols = document.getElementById("symbols");

    /* SLIDER */

    function updateSlider(){

      const value =
      ((slider.value - slider.min) /
      (slider.max - slider.min)) * 100;

      slider.style.background =
      `linear-gradient(
        90deg,
        #111 ${value}%,
        rgba(0,0,0,.08) ${value}%
      )`;

    }

    slider.addEventListener("input", () => {

      lengthInput.value = slider.value;

      updateSlider();

    });

    lengthInput.addEventListener("input", () => {

      let value = parseInt(lengthInput.value);

      if(isNaN(value)) value = 6;

      if(value < 6) value = 6;
      if(value > 64) value = 64;

      slider.value = value;
      lengthInput.value = value;

      updateSlider();

    });

    /* PASSWORD */

    function generatePassword(){

      const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const lower = "abcdefghijklmnopqrstuvwxyz";
      const nums = "0123456789";
      const syms = "!@#$%^&*()_+=-{}[]<>?/";

      let chars = "";

      if(uppercase.checked) chars += upper;
      if(lowercase.checked) chars += lower;
      if(numbers.checked) chars += nums;
      if(symbols.checked) chars += syms;

      if(chars.length === 0){

        password.textContent =
        "Select at least one option";

        return;

      }

      let result = "";

      for(let i = 0; i < slider.value; i++){

        result += chars.charAt(
          Math.floor(Math.random() * chars.length)
        );

      }

      password.textContent = result;

    }

    generateBtn.addEventListener(
      "click",
      generatePassword
    );

    /* COPY */

    copyBtn.addEventListener(
      "click",
      async () => {

        await navigator.clipboard.writeText(
          password.textContent
        );

        copyBtn.classList.add("copied");

        setTimeout(() => {

          copyBtn.classList.remove("copied");

        }, 1600);

      }
    );

    updateSlider();
    generatePassword();

  </script>

</body>
</html>
