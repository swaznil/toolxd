<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Stats • ToolXD</title>

    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="textstats.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-grid"></div>
    <div class="gradient gradient-1"></div>
    <div class="gradient gradient-2"></div>
    <div class="noise"></div>

    <header class="topbar">
      <div class="logo">ToolXD</div>
      <a href="../../index.html" class="back"> ← Back </a>
    </header>

    <main class="wrapper">

      <section class="hero">
        <span class="eyebrow">Writing Utility</span>
        <h1> Text <br> Statistics </h1>
        <p> Analyze words, characters, reading time, sentences, and text density instantly. </p>
      </section>

      <section class="workspace panel">
        <div class="editor">
          <textarea id="textInput" placeholder="Start typing or paste your text here..."></textarea>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="label">Words</span>
            <h2 id="wordCount">0</h2>
          </div>
          <div class="stat-card">
            <span class="label">Characters</span>
            <h2 id="charCount">0</h2>
          </div>
          <div class="stat-card">
            <span class="label">Sentences</span>
            <h2 id="sentenceCount">0</h2>
          </div>
          <div class="stat-card">
            <span class="label">Paragraphs</span>
            <h2 id="paragraphCount">0</h2>
          </div>
          <div class="stat-card">
            <span class="label">Reading Time</span>
            <h2 id="readingTime">0m</h2>
          </div>
          <div class="stat-card">
            <span class="label">Characters No Spaces</span>
            <h2 id="charNoSpace">0</h2>
          </div>
        </div>
      </section>
      
    </main>

<script src="textstats.js"></script>
</body>
</html>
